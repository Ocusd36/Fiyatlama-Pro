<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProAnaliz - Fiyatlama Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 antialiased text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function FiyatlamaApp() {
            // Orijinal State Tanımlamalarınız
            const [kaynakMaliyeti, setKaynakMaliyeti] = useState(45.50);
            const [brutKarMarji, setBrutKarMarji] = useState(2.50);
            const [vade, setVade] = useState(30);
            const [bsmvOrani, setBsmvOrani] = useState(5.00);
            const [komisyonOrani, setKomisyonOrani] = useState(1.25);
            const [kkdfOrani, setKkdfOrani] = useState(0.00);
            
            const [aktifSekme, setAktifSekme] = useState('kredi'); // kredi, mevduat, nakit
            const [islemTutari, setIslemTutari] = useState(1000000);

            // Orijinal Hesaplama Motorunuz
            const hesaplamalar = useMemo(() => {
                const yalinFaiz = kaynakMaliyeti + brutKarMarji;
                const bsmvTutari = yalinFaiz * (bsmvOrani / 100);
                const kkdfTutari = yalinFaiz * (kkdfOrani / 100);
                
                const gunFaktoru = vade / 360;
                const komisyonEtkisi = gunFaktoru > 0 ? (komisyonOrani / gunFaktoru) / 100 : 0;
                
                const efektifFaiz = yalinFaiz + bsmvTutari + kkdfTutari + (komisyonEtkisi * 100);
                
                // Tutar Bazlı Hesaplamalar
                const brutFaizTutari = islemTutari * (yalinFaiz / 100) * gunFaktoru;
                const bsmvKesintisi = brutFaizTutari * (bsmvOrani / 100);
                const komisyonTutari = islemTutari * (komisyonOrani / 100);
                const netEleGecen = islemTutari - komisyonTutari;
                
                return {
                    yalinFaiz,
                    bsmvTutari,
                    kkdfTutari,
                    efektifFaiz,
                    brutFaizTutari,
                    bsmvKesintisi,
                    komisyonTutari,
                    netEleGecen
                };
            }, [kaynakMaliyeti, brutKarMarji, vade, bsmvOrani, komisyonOrani, kkdfOrani, islemTutari]);

            return (
                <div class="min-h-screen bg-slate-50 flex flex-col">
                    {/* Üst Bar */}
                    <header class="bg-white border-b border-slate-200 px-6 py-4 shadow-xs">
                        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                            <div class="flex items-center space-x-3">
                                <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-md shadow-blue-100">
                                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 class="text-xl font-bold text-slate-800 tracking-tight">ProAnaliz</h1>
                                    <p class="text-xs font-semibold text-slate-500">Kurumsal Fiyatlama ve Karlılık Modülü</p>
                                </div>
                            </div>
                            
                            {/* Orijinal Sekme Butonlarınız */}
                            <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                                <button onClick={() => setAktifSekme('kredi')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${aktifSekme === 'kredi' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>Kredi Fiyatlama</button>
                                <button onClick={() => setAktifSekme('mevduat')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${aktifSekme === 'mevduat' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>Mevduat Getirisi</button>
                                <button onClick={() => setAktifSekme('nakit')} class={`px-4 py-2 rounded-lg text-xs font-bold transition-all ${aktifSekme === 'nakit' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>Nakit Akışı</button>
                            </div>
                        </div>
                    </header>

                    {/* Ana Gövde */}
                    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-1 grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        {/* Sol Taraf: Girdi Parametreleri */}
                        <div class="lg:col-span-2 space-y-6">
                            <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-xs">
                                <div class="flex items-center space-x-2 mb-6 border-b border-slate-100 pb-4">
                                    <i data-lucide="sliders" class="w-5 h-5 text-blue-600"></i>
                                    <h2 class="text-base font-bold text-slate-800">İşlem Parametreleri</h2>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">İşlem Tutarı (TRY)</label>
                                        <input type="number" value={islemTutari} onChange={(e) => setIslemTutari(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Vade (Gün)</label>
                                        <input type="number" value={vade} onChange={(e) => setVade(parseInt(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">FTP / Fonlama Maliyeti (%)</label>
                                        <input type="number" step="0.01" value={kaynakMaliyeti} onChange={(e) => setKaynakMaliyeti(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Hedef Kâr Marjı (%)</label>
                                        <input type="number" step="0.01" value={brutKarMarji} onChange={(e) => setBrutKarMarji(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Komisyon Oranı (%)</label>
                                        <input type="number" step="0.01" value={komisyonOrani} onChange={(e) => setKomisyonOrani(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">BSMV Oranı (%)</label>
                                        <input type="number" step="0.01" value={bsmvOrani} onChange={(e) => setBsmvOrani(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                    </div>
                                </div>
                            </div>

                            {/* Orijinal Kırılım ve Detay Tablonuz */}
                            <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-xs">
                                <div class="flex items-center space-x-2 mb-4">
                                    <i data-lucide="pie-chart" class="w-5 h-5 text-blue-600"></i>
                                    <h3 class="text-sm font-bold text-slate-800">Finansal Kırılımlar ve Nakit Dağılımı</h3>
                                </div>
                                <div class="overflow-x-auto">
                                    <table class="w-full text-left text-xs font-semibold text-slate-600">
                                        <thead>
                                            <tr class="bg-slate-50 text-slate-500 uppercase tracking-wider border-b border-slate
