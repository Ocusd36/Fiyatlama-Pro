<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProAnaliz - Fiyatlama Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- React ve ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide İkonları -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 antialiased text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function FiyatlamaApp() {
            const [kaynakMaliyeti, setKaynakMaliyeti] = useState(45.50);
            const [brutKarMarji, setBrutKarMarji] = useState(2.50);
            const [vade, setVade] = useState(30);
            const [bsmvOrani, setBsmvOrani] = useState(5.00);
            const [komisyonOrani, setKomisyonOrani] = useState(1.25);
            const [efektifFaiz, setEfektifFaiz] = useState(0);
            const [tab, setTab] = useState('hesaplama');

            useEffect(() => {
                const maliyetFaktoru = kaynakMaliyeti / 100;
                const karFaktoru = brutKarMarji / 100;
                const bsmvFaktoru = bsmvOrani / 100;
                const komisyonFaktoru = komisyonOrani / 100;

                const gunFaktoru = vade / 360;
                const temelOran = maliyetFaktoru + karFaktoru;
                const bsmvDahilFaiz = temelOran * (1 + bsmvFaktoru);
                const toplamMaliyet = bsmvDahilFaiz + (komisyonFaktoru / (gunFaktoru || 1));
                
                setEfektifFaiz(toplamMaliyet * 100);
            }, [kaynakMaliyeti, brutKarMarji, vade, bsmvOrani, komisyonOrani]);

            return (
                <div class="min-h-screen bg-slate-50 flex flex-col justify-between">
                    <header class="bg-white border-b border-slate-200 px-6 py-4 shadow-xs">
                        <div class="max-w-7xl mx-auto flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <div class="bg-blue-600 text-white p-2 rounded-xl shadow-md shadow-blue-200">
                                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                                </div>
                                <div>
                                    <h1 class="text-xl font-bold text-slate-800 tracking-tight">ProAnaliz</h1>
                                    <p class="text-xs font-medium text-slate-500">Kurumsal Fiyatlama ve Karlılık Modülü</p>
                                </div>
                            </div>
                            <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                                <button onClick={() => setTab('hesaplama')} class={`px-4 py-2 rounded-lg text-xs font-semibold ${tab === 'hesaplama' ? 'bg-white text-blue-600 shadow-xs' : 'text-slate-600'}`}>Fiyatlama</button>
                                <button onClick={() => setTab('senaryo')} class={`px-4 py-2 rounded-lg text-xs font-semibold ${tab === 'senaryo' ? 'bg-white text-blue-600 shadow-xs' : 'text-slate-600'}`}>Senaryolar</button>
                            </div>
                        </div>
                    </header>

                    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-1">
                        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div class="lg:col-span-2 space-y-6">
                                <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-xs">
                                    <h2 class="text-base font-bold text-slate-800 mb-6 flex items-center">
                                        <span class="w-2 h-4 bg-blue-600 rounded-sm mr-2 block"></span>
                                        Fiyatlama Parametreleri
                                    </h2>
                                    
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">FTP / Kaynak Maliyeti (%)</label>
                                            <div class="relative">
                                                <input type="number" step="0.01" value={kaynakMaliyeti} onChange={(e) => setKaynakMaliyeti(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                                <span class="absolute right-4 top-3 text-slate-400 font-bold text-sm">%</span>
                                            </div>
                                        </div>

                                        <div>
                                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Hedef Brüt Kâr Marjı (%)</label>
                                            <div class="relative">
                                                <input type="number" step="0.01" value={brutKarMarji} onChange={(e) => setBrutKarMarji(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                                <span class="absolute right-4 top-3 text-slate-400 font-bold text-sm">%</span>
                                            </div>
                                        </div>

                                        <div>
                                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Vade (Gün)</label>
                                            <div class="relative">
                                                <input type="number" value={vade} onChange={(e) => setVade(parseInt(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                                <span class="absolute right-4 top-3 text-slate-400 font-medium text-xs text-slate-500">Gün</span>
                                            </div>
                                        </div>

                                        <div>
                                            <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Komisyon Oranı (%)</label>
                                            <div class="relative">
                                                <input type="number" step="0.01" value={komisyonOrani} onChange={(e) => setKomisyonOrani(parseFloat(e.target.value) || 0)} class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800" />
                                                <span class="absolute right-4 top-3 text-slate-400 font-bold text-sm">%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-6">
                                <div class="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl p-6 text-white shadow-xl relative overflow-hidden">
                                    <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Müşteri Teklif Oranı</h3>
                                    <p class="text-xs text-slate-400 mb-6 font-medium">BSMV ve Komisyonlar Dahil Efektif Getiri</p>
                                    
                                    <div class="mb-6">
                                        <span class="text-4xl font-black tracking-tight text-emerald-400">%{efektifFaiz.toFixed(2)}</span>
                                        <span class="text-xs text-slate-400 ml-2 block mt-1 font-semibold">Yıllık Efektif Maliyet Oranı</span>
                                    </div>

                                    <div class="border-t border-slate-700/50 pt-4 space-y-3">
                                        <div class="flex justify-between text-xs font-medium">
                                            <span class="text-slate-400">Yalın Faiz Oranı:</span>
                                            <span class="font-bold text-slate-200">%{ (kaynakMaliyeti + brutKarMarji).toFixed(2) }</span>
                                        </div>
                                        <div class="flex justify-between text-xs font-medium">
                                            <span class="text-slate-400">BSMV Etkisi:</span>
                                            <span class="font-bold text-slate-200">%+{ ((kaynakMaliyeti + brutKarMarji) * (bsmvOrani/100)).toFixed(2) }</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer class="bg-white border-t border-slate-200 py-4 px-6 text-center text-xs text-slate-400 font-medium">
                        &copy; 2026 ProAnaliz Finansal Teknolojiler. Tüm hakları saklıdır.
                    </footer>
                </div>
            );
        }

        // Düzeltilmiş başlatma kodu
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FiyatlamaApp />);
        
        setTimeout(() => { lucide.createIcons(); }, 200);
    </script>
</body>
</html>
